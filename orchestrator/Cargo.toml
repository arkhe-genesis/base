[package]
name = "orchestrator"
version = "0.1.0"
edition = "2021"

[dependencies]
ndarray = "0.15"
nalgebra = "0.32"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
lazy_static = "1.4"
prometheus = "0.13"
tracing = "0.1"
chrono = "0.4"
uuid = { version = "1.0", features = ["v4"] }
async-trait = "0.1"

[lib]
path = "src/lib.rs"
