[package]
name = "base-common-precompiles"
description = "Base precompile definitions and fork-specific precompile sets"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
exclude.workspace = true

[lints]
workspace = true

[dependencies]
# alloy
alloy-evm.workspace = true
alloy-sol-types.workspace = true
alloy-primitives.workspace = true

# base
base-common-chains.workspace = true
base-precompile-macros.workspace = true
base-precompile-storage.workspace = true

# revm
revm.workspace = true

[dev-dependencies]
rstest.workspace = true
criterion.workspace = true
k256 = { workspace = true, features = ["ecdsa"] }
base-precompile-storage = { workspace = true, features = ["test-utils"] }

[[bench]]
name = "base_precompiles"
harness = false
required-features = ["test-utils"]

[features]
default = [ "blst", "c-kzg", "portable", "secp256k1", "std" ]
std = [
	"alloy-evm/std",
	"alloy-primitives/std",
	"alloy-sol-types/std",
	"base-common-chains/std",
	"base-precompile-storage/std",
	"revm/std",
]
bn = [ "revm/bn" ]
blst = [ "revm/blst" ]
c-kzg = [ "revm/c-kzg" ]
portable = [ "revm/portable" ]
secp256k1 = [ "revm/secp256k1" ]
memory_limit = [ "revm/memory_limit" ]
optional_no_base_fee = [ "revm/optional_no_base_fee" ]
optional_eip3541 = [ "revm/optional_eip3541" ]
optional_eip3607 = [ "revm/optional_eip3607" ]
optional_fee_charge = [ "revm/optional_fee_charge" ]
optional_balance_check = [ "revm/optional_balance_check" ]
optional_block_gas_limit = [ "revm/optional_block_gas_limit" ]
test-utils = [
	"base-common-chains/test-utils",
	"base-precompile-storage/test-utils",
]
