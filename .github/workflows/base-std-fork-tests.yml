name: Base Std Fork Tests

on:
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BASE_ANVIL_REF: base-anvil-fork
  BASE_STD_REF: main
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: "sccache"
  SCCACHE_GHA_ENABLED: "true"

permissions:
  contents: read

jobs:
  fork-tests:
    name: Base Std Fork Tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          allowed-endpoints: >
            api.github.com:443
            bun.sh:443
            github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            api.anthropic.com:443
            binaries.soliditylang.org:443
            sp1.succinct.xyz:443
            raw.githubusercontent.com:443
            hosted-compute-request-orchestrator-prod-iad-02.githubapp.com:443
            prod.app-api.stepsecurity.io:443
            claude.ai:443
            downloads.claude.ai:443
            productionresultssa0.blob.core.windows.net:443
            productionresultssa1.blob.core.windows.net:443
            productionresultssa2.blob.core.windows.net:443
            productionresultssa3.blob.core.windows.net:443
            productionresultssa4.blob.core.windows.net:443
            productionresultssa5.blob.core.windows.net:443
            productionresultssa6.blob.core.windows.net:443
            productionresultssa7.blob.core.windows.net:443
            productionresultssa8.blob.core.windows.net:443
            productionresultssa9.blob.core.windows.net:443
            productionresultssa10.blob.core.windows.net:443
            productionresultssa11.blob.core.windows.net:443
            productionresultssa12.blob.core.windows.net:443
            productionresultssa13.blob.core.windows.net:443
            productionresultssa14.blob.core.windows.net:443
            productionresultssa15.blob.core.windows.net:443
            productionresultssa16.blob.core.windows.net:443
            productionresultssa17.blob.core.windows.net:443
            productionresultssa18.blob.core.windows.net:443
            productionresultssa19.blob.core.windows.net:443




            static.crates.io:443
            index.crates.io:443
            static.rust-lang.org:443
            hosted-compute-request-orchestrator-prod-eus-02.githubapp.com:443
            actions-results-receiver-production.githubapp.com:443
            hosted-compute-watchdog-prod-eus-02.githubapp.com:443
            actions-results-receiver-production.githubapp.com:443

      - name: Checkout Base
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          free-disk: "true"
          foundry: "true"
          mold: "true"
          native-deps: "true"
          rust-cache-shared-key: "base-std-fork-tests"

      - name: Clone fork-test repositories
        shell: bash
        run: |
          set -euo pipefail

          workdir="$RUNNER_TEMP/base-std-fork-tests"
          rm -rf "$workdir"
          mkdir -p "$workdir"

          git clone --depth 1 --single-branch --recurse-submodules --shallow-submodules \
            --branch "$BASE_STD_REF" \
            https://github.com/base/base-std.git "$workdir/base-std"
          git clone --depth 1 --single-branch --branch "$BASE_ANVIL_REF" \
            https://github.com/base/base-anvil.git "$workdir/base-anvil"

          echo "BASE_STD_DIR=$workdir/base-std" >> "$GITHUB_ENV"
          echo "BASE_ANVIL_DIR=$workdir/base-anvil" >> "$GITHUB_ENV"

      - name: Build patched base-anvil binaries
        shell: bash
        env:
          CARGO_PROFILE_RELEASE_LTO: "false"
        run: |
          set -euo pipefail

          cd "$BASE_ANVIL_DIR"
          rustup show active-toolchain
          cargo \
            --config "patch.\"https://github.com/base/base.git\".base-common-precompiles.path=\"$GITHUB_WORKSPACE/crates/common/precompiles\"" \
            --config "patch.\"https://github.com/base/base.git\".base-common-chains.path=\"$GITHUB_WORKSPACE/crates/common/chains\"" \
            build --release --no-default-features --features anvil/cli -p anvil -p forge

          "$BASE_ANVIL_DIR/target/release/anvil" --version
          "$BASE_ANVIL_DIR/target/release/forge" --version

      - name: Run base-std fork tests
        shell: bash
        run: |
          set -euo pipefail

          cd "$BASE_STD_DIR"
          ANVIL_BIN="$BASE_ANVIL_DIR/target/release/anvil" \
            FORGE_BIN="$BASE_ANVIL_DIR/target/release/forge" \
            ANVIL_LOG="$RUNNER_TEMP/base-std-anvil.log" \
            ./script/run-fork-tests.sh
