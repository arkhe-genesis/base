name: SP1 ELF Manifest

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AUTOMATION_BRANCH: automation/update-sp1-elf-manifest
  MANIFEST_PATH: crates/proof/succinct/elf/manifest.toml
  TARGET_BRANCH: main

permissions:
  contents: write
  pull-requests: write

jobs:
  update-manifest:
    name: Update SP1 ELF Manifest
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          allowed-endpoints: >
            api.github.com:443
            bun.sh:443
            github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            api.anthropic.com:443
            binaries.soliditylang.org:443
            sp1.succinct.xyz:443
            raw.githubusercontent.com:443
            hosted-compute-request-orchestrator-prod-iad-02.githubapp.com:443
            prod.app-api.stepsecurity.io:443
            claude.ai:443
            downloads.claude.ai:443
            productionresultssa0.blob.core.windows.net:443
            productionresultssa1.blob.core.windows.net:443
            productionresultssa2.blob.core.windows.net:443
            productionresultssa3.blob.core.windows.net:443
            productionresultssa4.blob.core.windows.net:443
            productionresultssa5.blob.core.windows.net:443
            productionresultssa6.blob.core.windows.net:443
            productionresultssa7.blob.core.windows.net:443
            productionresultssa8.blob.core.windows.net:443
            productionresultssa9.blob.core.windows.net:443
            productionresultssa10.blob.core.windows.net:443
            productionresultssa11.blob.core.windows.net:443
            productionresultssa12.blob.core.windows.net:443
            productionresultssa13.blob.core.windows.net:443
            productionresultssa14.blob.core.windows.net:443
            productionresultssa15.blob.core.windows.net:443
            productionresultssa16.blob.core.windows.net:443
            productionresultssa17.blob.core.windows.net:443
            productionresultssa18.blob.core.windows.net:443
            productionresultssa19.blob.core.windows.net:443




            static.crates.io:443
            index.crates.io:443
            static.rust-lang.org:443
            hosted-compute-request-orchestrator-prod-eus-02.githubapp.com:443
            actions-results-receiver-production.githubapp.com:443
            hosted-compute-watchdog-prod-eus-02.githubapp.com:443
            actions-results-receiver-production.githubapp.com:443

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
          ref: ${{ env.TARGET_BRANCH }}

      - name: Detect SP1 ELF input changes
        id: elf-inputs
        if: github.event_name != 'workflow_dispatch'
        run: python3 etc/scripts/ci/check-succinct-elf-inputs.py

      - name: Report no SP1 ELF input changes
        if: >-
          github.event_name != 'workflow_dispatch' &&
          steps.elf-inputs.outputs.needs_rebuild != 'true'
        run: echo "No SP1 ELF inputs changed; skipping manifest refresh." >> "$GITHUB_STEP_SUMMARY"

      - uses: ./.github/actions/setup
        if: >-
          github.event_name == 'workflow_dispatch' ||
          steps.elf-inputs.outputs.needs_rebuild == 'true'
        with:
          free-disk: "true"
          sp1: "true"

      - name: Rebuild and update SP1 ELF manifest
        id: elf-manifest
        if: >-
          github.event_name == 'workflow_dispatch' ||
          steps.elf-inputs.outputs.needs_rebuild == 'true'
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${RUNNER_TEMP:-/tmp}/sp1-elf-manifest"
          mkdir -p "$report_dir"
          hash_file="$report_dir/hashes.txt"
          diff_file="$report_dir/manifest.diff"

          just succinct build-elfs
          just succinct write-manifest
          python3 etc/scripts/local/check-elf-manifest.py \
            --print-hashes "$MANIFEST_PATH" crates/proof/succinct/elf \
            | tee "$hash_file"
          git diff -- "$MANIFEST_PATH" | tee "$diff_file"

          if [ -s "$diff_file" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report current SP1 ELF manifest
        if: steps.elf-manifest.outputs.changed == 'false'
        run: echo "SP1 ELF manifest already matches the fresh build." >> "$GITHUB_STEP_SUMMARY"

      - name: Open or update manifest refresh PR
        if: steps.elf-manifest.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${RUNNER_TEMP:-/tmp}/sp1-elf-manifest"
          hash_file="$report_dir/hashes.txt"
          diff_file="$report_dir/manifest.diff"
          body_file="$report_dir/pr-body.md"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$AUTOMATION_BRANCH"
          git add "$MANIFEST_PATH"
          git commit -m "fix(proof): refresh succinct elf manifest"

          remote_sha="$(git ls-remote --heads origin "$AUTOMATION_BRANCH" | awk '{print $1}')"
          if [ -n "$remote_sha" ]; then
            git push --force-with-lease="refs/heads/$AUTOMATION_BRANCH:$remote_sha" \
              origin "HEAD:refs/heads/$AUTOMATION_BRANCH"
          else
            git push origin "HEAD:refs/heads/$AUTOMATION_BRANCH"
          fi

          {
            echo "## Summary"
            echo
            echo "Refreshes \`$MANIFEST_PATH\` from a fresh SP1 ELF build after a merge to trunk (\`$TARGET_BRANCH\`)."
            echo
            echo "Generated by ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}."
            echo
            echo "## Validation"
            echo
            echo "- \`just succinct build-elfs\`"
            echo "- \`just succinct write-manifest\`"
            echo "- \`python3 etc/scripts/local/check-elf-manifest.py --print-hashes $MANIFEST_PATH crates/proof/succinct/elf\`"
            echo
            echo "## Hashes"
            echo
            echo '```text'
            cat "$hash_file"
            echo '```'
            echo
            echo "## Diff"
            echo
            echo '```diff'
            cat "$diff_file"
            echo '```'
          } > "$body_file"

          pr_number="$(
            gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --head "$AUTOMATION_BRANCH" \
              --base "$TARGET_BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number // ""'
          )"

          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" \
              --repo "$GITHUB_REPOSITORY" \
              --title "fix(proof): refresh succinct elf manifest" \
              --body-file "$body_file"
            pr_url="$(gh pr view "$pr_number" --repo "$GITHUB_REPOSITORY" --json url --jq '.url')"
          else
            pr_url="$(
              gh pr create \
                --repo "$GITHUB_REPOSITORY" \
                --base "$TARGET_BRANCH" \
                --head "$AUTOMATION_BRANCH" \
                --title "fix(proof): refresh succinct elf manifest" \
                --body-file "$body_file"
            )"
          fi

          echo "Opened or updated SP1 ELF manifest PR: $pr_url" >> "$GITHUB_STEP_SUMMARY"
