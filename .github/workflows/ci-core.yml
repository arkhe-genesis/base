name: CI Core

on:
  workflow_call:
    inputs:
      base_ref:
        required: false
        type: string
        default: ""
      build_command:
        required: true
        type: string
      test_command:
        required: true
        type: string
      clippy_command:
        required: true
        type: string
      run_sigsegv:
        required: false
        type: boolean
        default: false
      run_devnet:
        required: false
        type: boolean
        default: false
      allow_registry_login:
        required: true
        type: boolean
      save_rust_cache:
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

permissions:
  checks: write
  contents: read

jobs:
