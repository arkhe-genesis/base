name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  # This allows posting comments and reviews
  # It does not allow pushing any commits or modifying any files in the repo
  pull-requests: write

jobs:
  review:
    name: Review PR
    # Note: This job runs on the BaseRunnerGroup to be able to access LLM Gateway
    # It will not work on other runners
    # Skip for external contributor PRs (forks) — secrets and runner group are unavailable
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Block unauthorized outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.anthropic.com:443
            binaries.soliditylang.org:443
            sp1.succinct.xyz:443
            raw.githubusercontent.com:443
            hosted-compute-request-orchestrator-prod-iad-02.githubapp.com:443
            hosted-compute-request-orchestrator-prod-iad-01.githubapp.com:443
            hosted-compute-watchdog-prod-iad-01.githubapp.com:443
            prod.app-api.stepsecurity.io:443
            claude.ai:443
            downloads.claude.ai:443
            productionresultssa1.blob.core.windows.net:443
            productionresultssa2.blob.core.windows.net:443
            productionresultssa3.blob.core.windows.net:443
            productionresultssa4.blob.core.windows.net:443
            productionresultssa5.blob.core.windows.net:443
            productionresultssa6.blob.core.windows.net:443
            productionresultssa7.blob.core.windows.net:443
            productionresultssa8.blob.core.windows.net:443
            productionresultssa9.blob.core.windows.net:443
            productionresultssa10.blob.core.windows.net:443
            productionresultssa11.blob.core.windows.net:443
            productionresultssa12.blob.core.windows.net:443
            productionresultssa13.blob.core.windows.net:443
            productionresultssa14.blob.core.windows.net:443
            productionresultssa15.blob.core.windows.net:443
            productionresultssa16.blob.core.windows.net:443
            productionresultssa17.blob.core.windows.net:443
            productionresultssa18.blob.core.windows.net:443
            productionresultssa19.blob.core.windows.net:443
            productionresultssa19.blob.core.windows.net:0
            productionresultssa0.blob.core.windows.net:443
            hosted-compute-request-orchestrator-prod-eus-02.githubapp.com:443
            hosted-compute-request-orchestrator-prod-eus-01.githubapp.com:443
            hosted-compute-watchdog-prod-eus-01.githubapp.com:443
            hosted-compute-watchdog-prod-eus-02.githubapp.com:443
            actions-results-receiver-production.githubapp.com:443
            static.crates.io:443
            index.crates.io:443
            static.rust-lang.org:443
            hosted-compute-request-orchestrator-prod-eus-02.githubapp.com:443
            hosted-compute-request-orchestrator-prod-eus-01.githubapp.com:443
            hosted-compute-watchdog-prod-eus-01.githubapp.com:443
            actions-results-receiver-production.githubapp.com:443
            hosted-compute-watchdog-prod-eus-02.githubapp.com:443
            api.github.com:443
            bun.sh:443
            github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            claude.ai:443
            downloads.claude.ai:443
            api.anthropic.com:443
            binaries.soliditylang.org:443
            sp1.succinct.xyz:443
            raw.githubusercontent.com:443
            hosted-compute-request-orchestrator-prod-iad-02.githubapp.com:443
            hosted-compute-request-orchestrator-prod-iad-01.githubapp.com:443
            hosted-compute-watchdog-prod-iad-01.githubapp.com:443
            prod.app-api.stepsecurity.io:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Run Claude Code
        id: claude-review
        uses: anthropics/claude-code-action@1b8ee3b94104046d71fde52ec3557651ad8c0d71 # v1.0.29
        env:

        with:
          anthropic_api_key: dummy_api_key
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # When track_progress is enabled:
          # - Creates a tracking comment with progress checkboxes
          # - Includes all PR context (comments, attachments, images)
          # - Updates progress as the review proceeds
          # - Marks as completed when done
          track_progress: false

          # review instructions
          prompt: |
            You are reviewing a Pull Request for Base Reth Node — a Rust Ethereum L2 node built on Reth.

            CODEBASE:
            - 4 core crate groups: crates/{client, builder, consensus, shared}
            - devnet/: system and E2E test infrastructure for Base node
            - Error handling: thiserror enums with From impls
            - Async: tokio, async-trait, arc-swap for lock-free config
            - CI already enforces: clippy (52 rules, -D warnings), rustfmt (2024 edition), cargo-deny, cargo-udeps

            REVIEW GUIDELINES:
            - Review like a senior Rust engineer on the team
            - Focus on correctness, safety, and idiomatic Rust
            - DO NOT comment on formatting or style — clippy and rustfmt handle that
            - DO NOT post praise, "looks good", or filler comments. If everything looks fine, post nothing
            - Use inline comments for specific code feedback via mcp__github_inline_comment__create_inline_comment
            - Post one summary comment at the end with your overall assessment (if you have findings)

            DUPLICATE AVOIDANCE:
            Before posting any inline comment, first fetch all existing inline review comments on this PR by running:
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments --jq '.[] | select(.user.login == "github-actions[bot]") | {path, body}'
            Do NOT post a comment if there is already a comment from github-actions[bot] on the same file raising the same or substantially similar issue.
            Only post new findings that haven't been raised before.

            WHAT TO LOOK FOR:
            - Error handling: .unwrap()/.expect() in non-test code, discarded error context (.map_err(|_| ...)), missing From impls
            - Memory & performance: unnecessary .clone() on large types in hot paths, unbounded collections from external input
            - Concurrency: locks held across .await, channel misuse (no backpressure, unhandled closed channels), cancellation safety in tokio::select!
            - Safety: unsafe without // SAFETY comments, unchecked arithmetic on financial/gas values, HashMap in determinism-sensitive code
            - API design: missing #[must_use] on Result-returning public methods, breaking changes to public interfaces
            - Architecture: dependency direction violations (shared depending on client/builder), tight coupling between crate layers
            - Rust idioms: &String instead of &str, &Vec<T> instead of &[T], manual implementations of standard traits, needless lifetime annotations

            COMMENT MANAGEMENT:
            Before posting your review summary, clean up previous summary comments from earlier runs:
            1. Delete your previous summary comments by running: gh pr comment ${{ github.event.pull_request.number }} --delete-last --yes
            2. Repeat step 1 until it returns an error (no more comments to delete)
            3. Then post your new summary using: gh pr comment ${{ github.event.pull_request.number }} --body "<!-- CLAUDE_REVIEW_SUMMARY -->\n\n<your summary>"
            Note: --delete-last only deletes your own top-level comments, not inline review comments or other users' comments.

          claude_args: |
            --model claude-opus-4-6-default
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment ${{ github.event.pull_request.number }} --body:*),Bash(gh pr comment ${{ github.event.pull_request.number }} --edit-last --body:*),Bash(gh pr comment ${{ github.event.pull_request.number }} --delete-last:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments:*)"
