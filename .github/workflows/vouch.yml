name: Vouch

on:
  pull_request_target:
    types: [opened, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: vouch-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check-pr:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          allowed-endpoints: >
            api.github.com:443
            bun.sh:443
            github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            api.anthropic.com:443
            claude.ai:443
            downloads.claude.ai:443
            *.blob.core.windows.net:443
            *.githubapp.com:443
            *.githubusercontent.com:443
            *.rust-lang.org:443
            *.crates.io:443
            static.crates.io:443
            index.crates.io:443
            static.rust-lang.org:443
            actions-results-receiver-production.githubapp.com:443
      - uses: mitchellh/vouch/action/check-pr@c6d80ead49839655b61b422700b7a3bc9d0804a9 # v1
        with:
          pr-number: ${{ github.event.pull_request.number }}
          auto-close: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  manage:
    if: >-
      github.event_name == 'issue_comment' && (
        contains(github.event.comment.body, 'vouch') ||
        contains(github.event.comment.body, 'denounce') ||
        contains(github.event.comment.body, 'unvouch')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          allowed-endpoints: >
            api.github.com:443
            bun.sh:443
            github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            api.anthropic.com:443
            claude.ai:443
            downloads.claude.ai:443
            *.blob.core.windows.net:443
            *.githubapp.com:443
            *.githubusercontent.com:443
            *.rust-lang.org:443
            *.crates.io:443
            static.crates.io:443
            index.crates.io:443
            static.rust-lang.org:443
            actions-results-receiver-production.githubapp.com:443
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: mitchellh/vouch/action/manage-by-issue@c6d80ead49839655b61b422700b7a3bc9d0804a9 # v1
        with:
          repo: ${{ github.repository }}
          issue-id: ${{ github.event.issue.number }}
          comment-id: ${{ github.event.comment.id }}
          # Branch protection requires changes go through a PR + merge queue.
          # Direct pushes to main are rejected (GH006).
          pull-request: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
