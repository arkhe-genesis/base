name: Docker

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/node-reth-dev

permissions:
  contents: read

jobs:
  build-and-push:
    strategy:
      matrix:
        settings:
          - arch: linux/amd64
            runs-on: ubuntu-24.04
          - arch: linux/arm64
            runs-on: ubuntu-24.04-arm

    runs-on: ${{ matrix.settings.runs-on }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          allowed-endpoints: >
            api.soldeer.xyz:443
            soldeer-revisions.s3.amazonaws.com:443
            soldeer-revisions.s3.us-east-1.amazonaws.com:443
            api.github.com:443
            bun.sh:443
            github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            api.anthropic.com:443
            binaries.soliditylang.org:443
            sp1.succinct.xyz:443
            raw.githubusercontent.com:443
            hosted-compute-request-orchestrator-prod-iad-02.githubapp.com:443
            hosted-compute-request-orchestrator-prod-iad-01.githubapp.com:443
            hosted-compute-watchdog-prod-iad-01.githubapp.com:443
            prod.app-api.stepsecurity.io:443
            claude.ai:443
            downloads.claude.ai:443
            productionresultssa0.blob.core.windows.net:443
            productionresultssa1.blob.core.windows.net:443
            productionresultssa2.blob.core.windows.net:443
            productionresultssa3.blob.core.windows.net:443
            productionresultssa4.blob.core.windows.net:443
            productionresultssa5.blob.core.windows.net:443
            productionresultssa6.blob.core.windows.net:443
            productionresultssa7.blob.core.windows.net:443
            productionresultssa8.blob.core.windows.net:443
            productionresultssa9.blob.core.windows.net:443
            productionresultssa10.blob.core.windows.net:443
            productionresultssa11.blob.core.windows.net:443
            productionresultssa12.blob.core.windows.net:443
            productionresultssa13.blob.core.windows.net:443
            productionresultssa14.blob.core.windows.net:443
            productionresultssa15.blob.core.windows.net:443
            productionresultssa16.blob.core.windows.net:443
            productionresultssa17.blob.core.windows.net:443
            productionresultssa18.blob.core.windows.net:443
            productionresultssa19.blob.core.windows.net:443




            static.crates.io:443
            index.crates.io:443
            static.rust-lang.org:443
            hosted-compute-request-orchestrator-prod-eus-02.githubapp.com:443
            hosted-compute-request-orchestrator-prod-eus-01.githubapp.com:443
            hosted-compute-watchdog-prod-eus-01.githubapp.com:443
            actions-results-receiver-production.githubapp.com:443
            hosted-compute-watchdog-prod-eus-02.githubapp.com:443
            actions-results-receiver-production.githubapp.com:443

      - name: Prepare
        run: |
          platform=${{ matrix.settings.arch }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - uses: actions/checkout@v4 # v6.0.2
        with:
          fetch-depth: 1

      - name: Prepare image labels
        id: image-labels
        run: |
          echo "source=https://github.com/${{ github.repository }}" >> $GITHUB_OUTPUT
          echo "revision=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        run: |
          docker buildx bake -f etc/docker/docker-bake.hcl client \
            --set client.tags=${{ env.REGISTRY_IMAGE }} \
            --set client.platform=${{ matrix.settings.arch }} \
            --set client.output=type=image,push-by-digest=true,name-canonical=true,push=true \
            --set client.cache-to=type=registry,ref=${{ env.REGISTRY_IMAGE }}:cache-${{ env.PLATFORM_PAIR }},mode=max \
            --set client.labels.org.opencontainers.image.source=${{ steps.image-labels.outputs.source }} \
            --set client.labels.org.opencontainers.image.revision=${{ steps.image-labels.outputs.revision }} \
            --set client.labels.org.opencontainers.image.created=${{ steps.image-labels.outputs.created }} \
            --metadata-file ${{ runner.temp }}/client-metadata.json

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="$(jq -er '."client"."containerimage.digest"' ${{ runner.temp }}/client-metadata.json)"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  warm-devnet-cache:
    strategy:
      matrix:
        target: [builder, consensus, batcher]

    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write

    env:
      PROFILE: dev

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          allowed-endpoints: >
            api.soldeer.xyz:443
            soldeer-revisions.s3.amazonaws.com:443
            soldeer-revisions.s3.us-east-1.amazonaws.com:443
            api.github.com:443
            bun.sh:443
            github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            api.anthropic.com:443
            binaries.soliditylang.org:443
            sp1.succinct.xyz:443
            raw.githubusercontent.com:443
            hosted-compute-request-orchestrator-prod-iad-02.githubapp.com:443
            hosted-compute-request-orchestrator-prod-iad-01.githubapp.com:443
            hosted-compute-watchdog-prod-iad-01.githubapp.com:443
            prod.app-api.stepsecurity.io:443
            claude.ai:443
            downloads.claude.ai:443
            productionresultssa0.blob.core.windows.net:443
            productionresultssa1.blob.core.windows.net:443
            productionresultssa2.blob.core.windows.net:443
            productionresultssa3.blob.core.windows.net:443
            productionresultssa4.blob.core.windows.net:443
