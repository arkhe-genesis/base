            index.crates.io:443
            static.rust-lang.org:443
            hosted-compute-request-orchestrator-prod-eus-02.githubapp.com:443
            hosted-compute-request-orchestrator-prod-eus-01.githubapp.com:443
            hosted-compute-watchdog-prod-eus-01.githubapp.com:443
            actions-results-receiver-production.githubapp.com:443
            hosted-compute-watchdog-prod-eus-02.githubapp.com:443
            actions-results-receiver-production.githubapp.com:443

      - uses: actions/checkout@v4 # v6.0.2
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Warm devnet image cache
        run: |
          docker buildx bake -f etc/docker/docker-bake.hcl ${{ matrix.target }} \
            --set ${{ matrix.target }}.platform=linux/amd64 \
            --set ${{ matrix.target }}.output=type=cacheonly \
            --set ${{ matrix.target }}.cache-to=type=registry,ref=${{ env.REGISTRY_IMAGE }}:cache-${{ matrix.target }}-linux-amd64,mode=max

  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs:
      - build-and-push
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          allowed-endpoints: >
            api.soldeer.xyz:443
            soldeer-revisions.s3.amazonaws.com:443
            soldeer-revisions.s3.us-east-1.amazonaws.com:443
            api.github.com:443
            bun.sh:443
            github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            api.anthropic.com:443
            binaries.soliditylang.org:443
            sp1.succinct.xyz:443
            raw.githubusercontent.com:443
