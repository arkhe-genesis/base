name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.6.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: publish-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  create-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.read-tag.outputs.tag }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          allowed-endpoints: >
            api.github.com:443
            bun.sh:443
            github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            api.anthropic.com:443
            binaries.soliditylang.org:443
            sp1.succinct.xyz:443
            raw.githubusercontent.com:443
            hosted-compute-request-orchestrator-prod-iad-02.githubapp.com:443
            prod.app-api.stepsecurity.io:443
            claude.ai:443
            downloads.claude.ai:443
            productionresultssa0.blob.core.windows.net:443
            productionresultssa1.blob.core.windows.net:443
            productionresultssa2.blob.core.windows.net:443
            productionresultssa3.blob.core.windows.net:443
            productionresultssa4.blob.core.windows.net:443
            productionresultssa5.blob.core.windows.net:443
            productionresultssa6.blob.core.windows.net:443
            productionresultssa7.blob.core.windows.net:443
            productionresultssa8.blob.core.windows.net:443
            productionresultssa9.blob.core.windows.net:443
            productionresultssa10.blob.core.windows.net:443
            productionresultssa11.blob.core.windows.net:443
            productionresultssa12.blob.core.windows.net:443
            productionresultssa13.blob.core.windows.net:443
            productionresultssa14.blob.core.windows.net:443
            productionresultssa15.blob.core.windows.net:443
            productionresultssa16.blob.core.windows.net:443
            productionresultssa17.blob.core.windows.net:443
            productionresultssa18.blob.core.windows.net:443
            productionresultssa19.blob.core.windows.net:443
            productionresultssa19.blob.core.windows.net:0




            static.crates.io:443
            index.crates.io:443
            static.rust-lang.org:443
            hosted-compute-request-orchestrator-prod-eus-02.githubapp.com:443
            actions-results-receiver-production.githubapp.com:443
            hosted-compute-watchdog-prod-eus-02.githubapp.com:443
            actions-results-receiver-production.githubapp.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate and prepare
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ inputs.version }}"
          RELEASE_BRANCH="releases/v${VERSION}"

          # Validate semver format
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION (expected X.Y.Z)"
            exit 1
          fi

          # Validate release branch exists
          git fetch origin "$RELEASE_BRANCH" || {
            echo "::error::Branch $RELEASE_BRANCH not found. Run Start Release first."
            exit 1
          }

      - name: Checkout release branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: releases/v${{ inputs.version }}
          fetch-depth: 0
          fetch-tags: true

      - name: Validate version and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ inputs.version }}"
          TAG="v${VERSION}"

          # Validate Cargo.toml version using cargo metadata via common.sh
          source ./etc/scripts/release/common.sh
          CARGO_VERSION=$(get_cargo_version)
          if [[ "$CARGO_VERSION" == "0.0.0" ]]; then
            echo "::error::Cargo.toml on releases/v${VERSION} is still 0.0.0 — merge the version sync PR first"
            exit 1
          fi
          if [[ "$CARGO_VERSION" != "$VERSION" ]]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match requested release version ($VERSION)"
            exit 1
          fi

          # Ensure no final git tag already exists
          if git rev-parse "v${VERSION}" > /dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists"
            exit 1
          fi

          # Ensure no final release already exists
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "::error::Release $TAG already exists"
            exit 1
          fi

      - name: Create and push tag
        run: ./etc/scripts/release/create-tag.sh "releases/v${{ inputs.version }}" final

      - name: Read tag
        id: read-tag
        run: |
          TAG_FILE="${{ runner.temp }}/release_tag"
          if [[ ! -f "$TAG_FILE" ]]; then
            echo "::error::release_tag file not found — create-tag.sh may have failed"
            exit 1
          fi
          TAG=$(cat "$TAG_FILE")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Summary
        run: |
          TAG="${{ steps.read-tag.outputs.tag }}"

          echo "## Tag Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag**: \`$TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Building release — Docker images and binaries will be published automatically." >> $GITHUB_STEP_SUMMARY

  build:
    needs: [create-tag]
    uses: ./.github/workflows/build-release.yml
    with:
      tag: ${{ needs.create-tag.outputs.tag }}
      is_final: true
    secrets: inherit
