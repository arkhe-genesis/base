name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1'   # Toda segunda-feira
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_VERSION: 1.94

jobs:
  # ==========================================================================
  # PRÉ-VERIFICAÇÃO
  # ==========================================================================
  pre-commit:
    name: 🔍 Pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy
          override: true
      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install xtask
        run: cargo install --path crates/cathedral-xtask || true
      - name: Run pre-commit
        run: cargo xtask pre-commit

  # ==========================================================================
  # CI COMPLETO
  # ==========================================================================
  ci:
    name: 🔬 CI (Linux)
    runs-on: ubuntu-latest
    needs: pre-commit
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy
          override: true
      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ci-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-ci-
      - name: Install tools
        run: |
          cargo install cargo-llvm-cov cargo-insta cargo-deadlinks || true
      - name: Run CI
        run: cargo xtask ci
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/coverage/
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/nextest/

  # ==========================================================================
  # BUILD ANDROID (ARM64)
  # ==========================================================================
  build-android:
    name: 📱 Build Android (ARM64)
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          override: true
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-33 build-tools;33.0.0'
      - name: Build PQC library
        run: |
          cd kernel/rust
          cargo ndk -t arm64-v8a build --release
      - name: Upload libcathedral.so
        uses: actions/upload-artifact@v4
        with:
          name: libcathedral-arm64
          path: kernel/rust/target/arm64-v8a/release/libcathedral.so

  # ==========================================================================
  # SECURITY SCANNING
  # ==========================================================================
  security:
    name: 🛡️ Security
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          override: true
      - name: Install tools
        run: cargo install cargo-deny cargo-audit
      - name: Run cargo deny
        run: cargo deny check
      - name: Run cargo audit
        run: cargo audit --deny-warnings
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

  # ==========================================================================
  # RELEASE
  # ==========================================================================
  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    needs: [build-android, security]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          override: true
      - name: Install tools
        run: cargo install cargo-sbom cargo-deadlinks
      - name: Run full audit
        run: cargo xtask full-audit
      - name: Generate SBOM
        run: cargo sbom --output target/sbom.json
      - name: Build all targets
        run: |
          cargo build --release
          cargo xtask doc
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/release/cathedral-bridge
            target/arm64-v8a/release/libcathedral.so
            target/sbom.json
          body_path: CHANGELOG.md
          draft: false
          prerelease: false

  # ==========================================================================
  # NOTIFICAÇÃO
  # ==========================================================================
  notify:
    name: 📨 Notify
    runs-on: ubuntu-latest
    needs: [pre-commit, ci, build-android, security]
    if: always()
    steps:
      - name: Status
        run: |
          echo "✅ Pre-commit: ${{ needs.pre-commit.result }}"
          echo "✅ CI: ${{ needs.ci.result }}"
          echo "✅ Build: ${{ needs.build-android.result }}"
          echo "✅ Security: ${{ needs.security.result }}"