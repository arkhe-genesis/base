name: Tests

on:
  push:
    branches: [main, "v*"]
  pull_request:
    branches: [main]

jobs:
  test-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short -k "not slow and not real"
        timeout-minutes: 5
