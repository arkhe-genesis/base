# config/prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'cathedral-bridge'
    static_configs:
      - targets: ['bridge:9002']
    metrics_path: /metrics

  - job_name: 'prometheus-agent'
    static_configs:
      - targets: ['prometheus-agent:9003']
    metrics_path: /metrics

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:9187']
