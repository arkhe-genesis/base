# docker-compose.yml
# Selo: CATHEDRAL-ARKHE-DEPLOYMENT-v1.0.0

version: '3.8'

services:
  bridge:
    build:
      context: .
      dockerfile: docker/Dockerfile.bridge
    image: cathedral/bridge:latest
    container_name: cathedral-bridge
    ports:
      - "9002:9002"
      - "8080:8080"
    volumes:
      - ./data/bridge:/app/data
      - ./config/bridge:/app/config
    environment:
      - RUST_LOG=info
      - DATA_DIR=/app/data
      - DEFAULT_TREE=production-tree
      - ROOT_AGENT=coordinator-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - cathedral-net

  prometheus-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.prometheus-agent
    image: cathedral/prometheus-agent:latest
    container_name: cathedral-prometheus-agent
    depends_on:
      bridge:
        condition: service_healthy
    environment:
      - RUST_LOG=info
      - BRIDGE_ENDPOINT=http://bridge:9002
      - AGENT_ID=prometheus-agent-1
      - PROJECT_ID=cathedral-production
      - INTERVAL_SECS=30
    restart: unless-stopped
    networks:
      - cathedral-net

  observer-5d:
    build:
      context: .
      dockerfile: docker/Dockerfile.observer
    image: cathedral/observer-5d:latest
    container_name: cathedral-observer-5d
    depends_on:
      bridge:
        condition: service_healthy
    environment:
      - RUST_LOG=info
      - BRIDGE_ENDPOINT=http://bridge:9002
      - SCAN_INTERVAL_SECS=10
      - RISK_THRESHOLD=0.6
      - SYNTHETIC_COUNCIL_SIZE=4
    restart: unless-stopped
    networks:
      - cathedral-net

  cem-adapter:
    build:
      context: .
      dockerfile: docker/Dockerfile.cem
    image: cathedral/cem-adapter:latest
    container_name: cathedral-cem-adapter
    depends_on:
      bridge:
        condition: service_healthy
    environment:
      - RUST_LOG=info
      - BRIDGE_ENDPOINT=http://bridge:9002
      - REVIEW_TIMEOUT_SECS=30
    restart: unless-stopped
    networks:
      - cathedral-net

  nostr-replicator:
    build:
      context: .
      dockerfile: docker/Dockerfile.nostr
    image: cathedral/nostr-replicator:latest
    container_name: cathedral-nostr-replicator
    depends_on:
      bridge:
        condition: service_healthy
    environment:
      - RUST_LOG=info
      - BRIDGE_ENDPOINT=http://bridge:9002
      - NOSTR_RELAYS=wss://relay.damus.io,wss://nos.lol
    restart: unless-stopped
    networks:
      - cathedral-net

  postgres:
    image: postgres:15-alpine
    container_name: cathedral-postgres
    environment:
      - POSTGRES_USER=cathedral
      - POSTGRES_PASSWORD=cathedral123
      - POSTGRES_DB=cathedral
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cathedral"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cathedral-net

  prometheus:
    image: prom/prometheus:latest
    container_name: cathedral-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - cathedral-net

  grafana:
    image: grafana/grafana:latest
    container_name: cathedral-grafana
    volumes:
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./data/grafana:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=cathedral
    restart: unless-stopped
    networks:
      - cathedral-net

networks:
  cathedral-net:
    driver: bridge

volumes:
  bridge_data:
  postgres_data:
  prometheus_data:
  grafana_data:
  safe-core-bridge-mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile.bridge
    container_name: safe-core-bridge-mcp
    ports:
      - "8081:8081"
    command: ["safe-core-bridge", "--mcp"]
    stdin_open: true
    tty: false
    environment:
      RUST_LOG: safe_core_bridge=warn
    restart: unless-stopped
    networks:
      - cathedral-net
